name: Build and upload to PyPI

on:
  workflow_dispatch:
  release:
    types: [published]


permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build_wheels_sdist:
    name: Build wheel and sdist
    runs-on: ubuntu-latest
    # # cibuildwheel is only needed for packages with compiled (C/Fortran) extensions
    # runs-on: ${{ matrix.os }}
    # strategy:
    #   fail-fast: false
    #   matrix:
    #     python-version: ["3.10","3.11","3.12","3.13"]
    #     os: [ubuntu-latest, windows-latest, macos-13, macos-14]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          # python-version: ${{ matrix.python-version }}  # required for cibuildwheel, but not needed for python -m build

      # cibuildwheel is only needed for packages with compiled (C/Fortran) extensions
      # CONAN generates a pure Python wheel, so we use python -m build instead
      # - name: Build wheels
      #   uses: pypa/cibuildwheel@v3.4.0
      #   env:
      #     CIBW_SKIP: "*-manylinux_i686 *musllinux* pp*"
      #     CIBW_BUILD: "cp310-* cp311-* cp312-* cp313-*"

      # - uses: actions/upload-artifact@v4
      #   with:
      #     name: cibw-wheels-${{ matrix.os }}-${{ strategy.job-index }}
      #     path: ./wheelhouse/*.whl

      - name: Build wheel and sdist
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - uses: actions/upload-artifact@v4
        with:
          name: dist #cibw-sdist
          path: dist/ #dist/*.tar.gz

  upload_pypi:
    name: Upload to PyPI
    runs-on: ubuntu-latest
    needs:
      - build_wheels_sdist
    permissions:
      id-token: write  # required for Trusted Publishing (OIDC)
    environment:
      name: deploy-to-pypi
      url: https://pypi.org/p/conan-exoplanet

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          # pattern: cibw-*
          path: dist
          # merge-multiple: true

      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          # user: __token__
          # password: ${{ secrets.PYPI_API_TOKEN }}  # not needed with Trusted Publishing
